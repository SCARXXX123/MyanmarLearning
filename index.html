<!DOCTYPE html>
<html lang="zh-CN">
<head>

        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .nav-link { padding: 18px 40px; border-radius: 12px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; text-decoration: none; font-weight: bold; display: block; text-align: center; }
        .learn { background: var(--primary); color: white; }
        .quiz { background: var(--success); color: white; }
        .vocabulary { background: #fbbc05; color: white; }
        .nav-link:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

</head>
<body>
    <div class="menu-card">

        <div class="btn-group">
